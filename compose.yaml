# Docker Compose development override
# This extends docker-compose.yml with development-specific settings.
# Run with: docker compose up --build

services:
  api:
    extends:
      file: docker-compose.yml
      service: api
    environment:
      - APP_ENV=development
      - DEBUG=true
    volumes:
      - .:/app
      - /app/node_modules  # Prevent node_modules from being overwritten

  celery-worker:
    extends:
      file: docker-compose.yml
      service: celery-worker
    environment:
      - APP_ENV=development

  celery-beat:
    extends:
      file: docker-compose.yml
      service: celery-beat
    environment:
      - APP_ENV=development

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  qdrant:
    extends:
      file: docker-compose.yml
      service: qdrant

  nginx:
    extends:
      file: docker-compose.yml
      service: nginx

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
